<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="styles.css">
  <title>Train Gearbox Endplay Calculator</title>
  </head>
  <body>

    <div class="container">
        <div class="in-out-btn">
            <button>Intermediate</button>
            <button>Output</button>
        </div>  
        
        <h1>Gearbox Endplay Calculator</h1>

          

          <div class="input-group">
              <label for="value1">Measurement for Load 1</label>
              <input type="number" id="value1" step="0.01">
          </div>

          <div class="input-group">
              <label for="value2">Measurement for Load 2</label>
              <input type="number" id="value2" step="0.01">
          </div>

          <div class="input-group">
              <label for="value2">Measurement for NoLoad 1</label>
              <input type="number" id="value3" step="0.01">
          </div>

          <div class="input-group">
              <label for="value2">Measurement for NoLoad 2</label>
              <input type="number" id="value4" step="0.01">
          </div>

          <button onclick="calculateInt()">Calculate</button>

          <div class="result" id="result">
          Result will appear here
          </div>

          <div class="status" id="status"></div>
    </div>

  </body>
</html>
